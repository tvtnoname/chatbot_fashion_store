version: '3.8'

services:
  # 1. Graph Database
  neo4j:
    image: neo4j:5.15.0
    container_name: fashion_neo4j
    ports:
      - "7474:7474" # HTTP (Browser UI)
      - "7687:7687" # Bolt (Driver connection)
    environment:
      NEO4J_AUTH: neo4j/fashion_password
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*,gds.*
    volumes:
      - ./data/neo4j/data:/data
      - ./data/neo4j/logs:/logs
    networks:
      - fashion_net
    healthcheck:
      test: [ "CMD-SHELL", "wget --no-verbose --tries=1 --spider localhost:7474 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Vector Database
  chromadb:
    image: chromadb/chroma:latest
    container_name: fashion_chroma
    ports:
      - "8000:8000"
    volumes:
      - ./data/chroma:/chroma/chroma
    networks:
      - fashion_net

  # 3. Application / Agent Runtime
  agent_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fashion_agent_core
    volumes:
      - .:/app
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=fashion_password
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    command: tail -f /dev/null # Keep running for development
    depends_on:
      neo4j:
        condition: service_healthy
    networks:
      - fashion_net

networks:
  fashion_net:
    driver: bridge
